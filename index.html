<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Ledger — Complete Version</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--paper:#F6F2E9; --teal-deep:#0A3A3E; --gold:#C08A2E; --ink:#1F2A24; --green:#2E7D4F; --red:#B0432E; --line:#DCD3BC; --card:#FFFDF8;}
  body{margin:0; background:var(--paper); font-family:'Inter', sans-serif;}
  .app{display:flex; min-height:100vh;}
  .sidebar{width:220px; background:var(--teal-deep); color:#fff; padding:20px;}
  .nav-item{padding:10px 0; cursor:pointer; display:block; color:#ddd;}
  .nav-item:hover{color:#fff;}
  .content{flex:1; padding:30px;}
  .view{display:none;} .view.active{display:block;}
  .card{background:var(--card); padding:20px; border-radius:10px; border:1px solid var(--line); display:inline-block; margin-right:10px;}
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:100;}
  .overlay.active{display:flex;}
  .modal{background:white; padding:25px; border-radius:15px; width:400px;}
  .field{margin-bottom:15px;}
  input{width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;}
  button{padding:10px 20px; cursor:pointer; background:var(--teal-deep); color:white; border:none; border-radius:5px;}
</style>
</head>
<body>

<div class="app">
  <nav class="sidebar">
    <h2>My Ledger</h2>
    <div class="nav-item active" onclick="go('dashboard')">◆ Dashboard</div>
    <div class="nav-item" onclick="go('loans')">₹ Loans</div>
    <div class="nav-item" onclick="go('txns')">⇄ Transactions</div>
    <hr>
    <div id="syncStatus">○ Connecting...</div>
    <button onclick="openSyncModal()">⚙ Sync / Login</button>
  </nav>

  <main class="content">
    <h1 id="viewTitle">Dashboard</h1>
    <section class="view active" id="view-dashboard">
      <div class="card">Income: <span id="dashIncome">₹0</span></div>
      <div class="card">Expense: <span id="dashExpense">₹0</span></div>
    </section>
    <section class="view" id="view-loans"><h3>Loans Feature Active</h3></section>
    <section class="view" id="view-txns"><h3>Transactions Feature Active</h3></section>
  </main>
</div>

<div class="overlay" id="syncOverlay">
  <div class="modal">
    <h3>Login / Sign Up</h3>
    <div class="field"><input type="email" id="authEmail" placeholder="Email"></div>
    <div class="field"><input type="password" id="authPassword" placeholder="Password"></div>
    <button onclick="doSignUp()">Sign Up</button>
    <button onclick="doSignIn()">Sign In</button>
    <button onclick="closeModal('syncOverlay')">Cancel</button>
  </div>
</div>

<script>
  const cfg = {
    apiKey: "AIzaSyA3037mG-4lYelAYyJOOBlH2HMphZv3zuw",
    authDomain: "m-finance1.firebaseapp.com",
    projectId: "m-finance1",
    storageBucket: "m-finance1.firebasestorage.app",
    messagingSenderId: "389169464362",
    appId: "1:389169464362:web:323fcfc231e5a8e8016f53"
  };

  let fbAuth = null, fbDb = null;

  window.onload = () => {
    setTimeout(() => {
      try {
        if (!firebase.apps.length) firebase.initializeApp(cfg);
        fbAuth = firebase.auth();
        fbDb = firebase.firestore();
        
        fbAuth.onAuthStateChanged(user => {
          if(user) {
            document.getElementById('syncStatus').textContent = "● Synced: " + user.email;
            // અહીંથી તમારા ડેટા લોડ કરવાનું ફંક્શન કોલ થશે
          } else {
            document.getElementById('syncStatus').textContent = "○ Not logged in";
          }
        });
      } catch(e) { document.getElementById('syncStatus').textContent = "Error"; }
    }, 1000);
  };

  function go(v){
    document.querySelectorAll('.view').forEach(s => s.classList.remove('active'));
    document.getElementById('view-'+v).classList.add('active');
  }

  function openSyncModal(){ document.getElementById('syncOverlay').classList.add('active'); }
  function closeModal(id){ document.getElementById(id).classList.remove('active'); }

  function doSignUp(){
    const e = document.getElementById('authEmail').value;
    const p = document.getElementById('authPassword').value;
    fbAuth.createUserWithEmailAndPassword(e, p).then(()=>location.reload()).catch(e=>alert(e.message));
  }

  function doSignIn(){
    const e = document.getElementById('authEmail').value;
    const p = document.getElementById('authPassword').value;
    fbAuth.signInWithEmailAndPassword(e, p).then(()=>location.reload()).catch(e=>alert(e.message));
  }
</script>
</body>
</html>
